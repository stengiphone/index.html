<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Coach Pro v3.3</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --bg:#0b1020;
    --card:rgba(255,255,255,0.06);
    --text:#fff;
    --muted:#94a3b8;
    --blue:#4f46e5;
    --purple:#a855f7;
    --red:#ef4444;
    --green:#22c55e;
    --border:rgba(255,255,255,0.1);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background:radial-gradient(circle at top,#111827,#050814);
    color:var(--text);
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    width:240px;
    height:100%;
    background:rgba(15,23,42,0.9);
    padding:20px;
    border-right:1px solid var(--border);
}

.sidebar h2{color:var(--purple);}

.nav button{
    width:100%;
    margin:6px 0;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:transparent;
    color:white;
    cursor:pointer;
}

.nav button:hover{background:var(--blue);}

/* MAIN */
.main{
    margin-left:260px;
    padding:20px;
}

.card{
    background:var(--card);
    padding:15px;
    margin:10px 0;
    border-radius:15px;
    border:1px solid var(--border);
    backdrop-filter:blur(10px);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    background:#111827;
    color:white;
    border:1px solid var(--border);
}

.primary{
    background:linear-gradient(45deg,var(--blue),var(--purple));
    color:white;
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

.btn-red{background:var(--red);color:white;border:none;padding:5px;border-radius:6px;cursor:pointer;}
.btn-blue{background:var(--blue);color:white;border:none;padding:5px;border-radius:6px;cursor:pointer;}
</style>
</head>

<body>

<div class="sidebar">
<h2>ML Coach Pro v3.3</h2>

<div class="nav">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('players')">Players</button>
<button onclick="show('finance')">Finance</button>
<button onclick="show('tournament')">Tournament</button>
<button onclick="show('stats')">Stats</button>
</div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h1>Dashboard</h1>

<div class="grid">
<div class="card">
<h3>Players</h3>
<h1 id="totalPlayers">0</h1>
</div>

<div class="card">
<h3>Income</h3>
<h1 id="income">RM 0</h1>
</div>

<div class="card">
<h3>Profit</h3>
<h1 id="profit">RM 0</h1>
</div>
</div>

<div class="card">
<canvas id="radar"></canvas>
</div>

</div>

<!-- PLAYERS -->
<div id="players" style="display:none">
<h1>Players</h1>

<input id="name" placeholder="Player Name">

<select id="role">
<option>Gold</option>
<option>Jungle</option>
<option>Mid</option>
<option>Roam</option>
<option>EXP</option>
</select>

<input id="salary" placeholder="Salary (RM)">

<button class="primary" onclick="addPlayer()">Add Player</button>

<div id="playerList"></div>
</div>

<!-- FINANCE -->
<div id="finance" style="display:none">
<h1>Finance</h1>

<div class="card">
<input id="sponsorName" placeholder="Sponsor Name">
<input id="sponsorAmount" placeholder="Amount (RM)">
<button class="primary" onclick="addSponsor()">Add Sponsor</button>
</div>

<div id="sponsorList"></div>
</div>

<!-- TOURNAMENT -->
<div id="tournament" style="display:none">
<h1>Tournament</h1>

<div class="card">
<input id="tName" placeholder="Tournament Name">
<input id="tPrize" placeholder="Prize Pool (RM)">
<button class="primary" onclick="addTournament()">Add Tournament</button>
</div>

<div id="tList"></div>
</div>

<!-- STATS -->
<div id="stats" style="display:none">
<h1>Team Stats</h1>
<div class="card" id="statsBox"></div>
</div>

</div>

<script>

let players = JSON.parse(localStorage.getItem("v33_players")) || [];
let sponsors = JSON.parse(localStorage.getItem("v33_sponsors")) || [];
let tournaments = JSON.parse(localStorage.getItem("v33_tournaments")) || [];

let chart;

/* NAV */
function show(page){
document.querySelectorAll(".main > div").forEach(e=>e.style.display="none");
document.getElementById(page).style.display="block";
}

/* PLAYERS */
function addPlayer(){

let name=document.getElementById("name").value;
let role=document.getElementById("role").value;
let salary=parseFloat(document.getElementById("salary").value||0);

if(!name)return;

players.push({
id:Date.now(),
name,
role,
salary,
kda:(Math.random()*10).toFixed(1),
win:(Math.random()*100).toFixed(0)
});

save();
renderPlayers();
update();
drawRadar();
}

/* SPONSOR */
function addSponsor(){

sponsors.push({
id:Date.now(),
name:document.getElementById("sponsorName").value,
amount:parseFloat(document.getElementById("sponsorAmount").value||0)
});

save();
renderSponsors();
update();
}

/* TOURNAMENT */
function addTournament(){

tournaments.push({
id:Date.now(),
name:document.getElementById("tName").value,
prize:parseFloat(document.getElementById("tPrize").value||0)
});

save();
renderTournaments();
update();
}

/* RENDER */
function renderPlayers(){
let html="";
players.forEach(p=>{
html+=`<div class="card"><b>${p.name}</b><p>${p.role}</p><p>Salary RM ${p.salary}</p></div>`;
});
document.getElementById("playerList").innerHTML=html;
}

function renderSponsors(){
let html="";
sponsors.forEach(s=>{
html+=`<div class="card">${s.name} - RM ${s.amount}</div>`;
});
document.getElementById("sponsorList").innerHTML=html;
}

function renderTournaments(){
let html="";
tournaments.forEach(t=>{
html+=`<div class="card">${t.name} - Prize RM ${t.prize}</div>`;
});
document.getElementById("tList").innerHTML=html;
}

/* DASHBOARD */
function update(){

let totalSalary = players.reduce((a,b)=>a+(b.salary||0),0);
let totalIncome = sponsors.reduce((a,b)=>a+(b.amount||0),0);
let profit = totalIncome - totalSalary;

document.getElementById("totalPlayers").innerText=players.length;
document.getElementById("income").innerText="RM "+totalIncome;
document.getElementById("profit").innerText="RM "+profit;

document.getElementById("statsBox").innerHTML=
"Avg KDA: "+(players.reduce((a,b)=>a+parseFloat(b.kda),0)/players.length||0).toFixed(2);
}

/* RADAR */
function drawRadar(){

let avg={kda:0,win:0};

players.forEach(p=>{
avg.kda+=parseFloat(p.kda);
avg.win+=parseFloat(p.win);
});

avg.kda/=players.length||1;
avg.win/=players.length||1;

if(chart)chart.destroy();

chart=new Chart(document.getElementById("radar"),{
type:"radar",
data:{
labels:["KDA","Win Rate"],
datasets:[{
label:"Team",
data:[avg.kda,avg.win],
backgroundColor:"rgba(168,85,247,0.2)",
borderColor:"#a855f7"
}]
}
});
}

/* SAVE */
function save(){
localStorage.setItem("v33_players",JSON.stringify(players));
localStorage.setItem("v33_sponsors",JSON.stringify(sponsors));
localStorage.setItem("v33_tournaments",JSON.stringify(tournaments));
}

/* INIT */
renderPlayers();
renderSponsors();
renderTournaments();
update();
drawRadar();
show("dashboard");

</script>

</body>
</html>
