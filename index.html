<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Coach Pro v3.1</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --bg:#0b1020;
    --card:rgba(255,255,255,0.06);
    --text:#fff;
    --muted:#94a3b8;
    --blue:#4f46e5;
    --purple:#a855f7;
    --red:#ef4444;
    --green:#22c55e;
    --border:rgba(255,255,255,0.1);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background:radial-gradient(circle at top,#111827,#050814);
    color:var(--text);
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    width:240px;
    height:100%;
    background:rgba(15,23,42,0.9);
    padding:20px;
    border-right:1px solid var(--border);
}

.sidebar h2{color:var(--purple);}

.nav button{
    width:100%;
    margin:6px 0;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:transparent;
    color:white;
    cursor:pointer;
}

.nav button:hover{background:var(--blue);}

/* MAIN */
.main{
    margin-left:260px;
    padding:20px;
}

.card{
    background:var(--card);
    padding:15px;
    margin:10px 0;
    border-radius:15px;
    border:1px solid var(--border);
    backdrop-filter:blur(10px);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    background:#111827;
    color:white;
    border:1px solid var(--border);
}

.primary{
    background:linear-gradient(45deg,var(--blue),var(--purple));
    color:white;
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

.small{font-size:12px;color:var(--muted);}
.btn-red{background:var(--red);color:white;border:none;padding:5px;border-radius:6px;cursor:pointer;}
.btn-blue{background:var(--blue);color:white;border:none;padding:5px;border-radius:6px;cursor:pointer;}
</style>
</head>

<body>

<div class="sidebar">
<h2>ML Coach Pro v3.1</h2>

<div class="nav">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('players')">Players</button>
<button onclick="show('stats')">Stats</button>
<button onclick="show('scrim')">Scrim</button>
</div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h1>Dashboard</h1>

<div class="grid">
<div class="card">
<h3>Players</h3>
<h1 id="totalPlayers">0</h1>
</div>

<div class="card">
<h3>Scrim</h3>
<h1 id="totalScrim">0</h1>
</div>

<div class="card">
<h3>Matches</h3>
<h1 id="totalMatches">0</h1>
</div>
</div>

<div class="card">
<canvas id="radar"></canvas>
</div>

</div>

<!-- PLAYERS -->
<div id="players" style="display:none">
<h1>Players</h1>

<input id="name" placeholder="Player Name">

<select id="role">
<option>Gold</option>
<option>Jungle</option>
<option>Mid</option>
<option>Roam</option>
<option>EXP</option>
</select>

<button class="primary" onclick="addPlayer()">Add Player</button>

<div id="playerList"></div>
</div>

<!-- STATS -->
<div id="stats" style="display:none">
<h1>Team Stats</h1>
<div class="card" id="statsBox"></div>
</div>

<!-- SCRIM -->
<div id="scrim" style="display:none">
<h1>Scrim Schedule</h1>

<div class="card">
<input id="scrimTeam" placeholder="Team">
<input id="scrimDate" type="date">
<button class="primary" onclick="addScrim()">Add Scrim</button>
</div>

<div id="scrimList"></div>
</div>

</div>

<script>

let players = JSON.parse(localStorage.getItem("v31_players")) || [];
let scrim = JSON.parse(localStorage.getItem("v31_scrim")) || [];

let chart;

/* NAV */
function show(page){
document.querySelectorAll(".main > div").forEach(e=>e.style.display="none");
document.getElementById(page).style.display="block";
}

/* ADD PLAYER */
function addPlayer(){
let name=document.getElementById("name").value;
let role=document.getElementById("role").value;
if(!name)return;

players.push({
id:Date.now(),
name,
role,
kda:(Math.random()*10).toFixed(1),
win:(Math.random()*100).toFixed(0)
});

save();
renderPlayers();
update();
drawRadar();
}

/* DELETE */
function delPlayer(id){
players=players.filter(p=>p.id!==id);
save();renderPlayers();update();drawRadar();
}

/* EDIT */
function editPlayer(id){
let p=players.find(x=>x.id===id);
let newName=prompt("Edit name:",p.name);
if(newName)p.name=newName;
save();renderPlayers();update();drawRadar();
}

/* SCRIM */
function addScrim(){
scrim.push({
id:Date.now(),
team:document.getElementById("scrimTeam").value,
date:document.getElementById("scrimDate").value
});
save();renderScrim();update();
}

/* RENDER PLAYERS */
function renderPlayers(){
let html="";
players.forEach(p=>{
html+=`
<div class="card">
<b>${p.name}</b>
<p>${p.role}</p>
<p>KDA:${p.kda} | WR:${p.win}%</p>

<button class="btn-blue" onclick="editPlayer(${p.id})">Edit</button>
<button class="btn-red" onclick="delPlayer(${p.id})">Del</button>
</div>`;
});
document.getElementById("playerList").innerHTML=html;
}

/* SCRIM */
function renderScrim(){
let html="";
scrim.forEach(s=>{
html+=`<div class="card">${s.team} - ${s.date}</div>`;
});
document.getElementById("scrimList").innerHTML=html;
}

/* UPDATE */
function update(){
document.getElementById("totalPlayers").innerText=players.length;
document.getElementById("totalScrim").innerText=scrim.length;
document.getElementById("totalMatches").innerText=0;

document.getElementById("statsBox").innerText=
"Avg KDA: "+(players.reduce((a,b)=>a+parseFloat(b.kda),0)/players.length||0).toFixed(2);
}

/* RADAR */
function drawRadar(){

let avg={kda:0,win:0};

players.forEach(p=>{
avg.kda+=parseFloat(p.kda);
avg.win+=parseFloat(p.win);
});

avg.kda/=players.length||1;
avg.win/=players.length||1;

if(chart)chart.destroy();

chart=new Chart(document.getElementById("radar"),{
type:"radar",
data:{
labels:["KDA","Win Rate"],
datasets:[{
label:"Team",
data:[avg.kda,avg.win],
backgroundColor:"rgba(168,85,247,0.2)",
borderColor:"#a855f7"
}]
}
});
}

/* SAVE */
function save(){
localStorage.setItem("v31_players",JSON.stringify(players));
localStorage.setItem("v31_scrim",JSON.stringify(scrim));
}

/* INIT */
renderPlayers();
renderScrim();
update();
drawRadar();
show("dashboard");

</script>

</body>
</html>
