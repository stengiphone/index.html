<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ML Coach Pro v3.5</title><style>body{font-family:Arial;background:#0b1020;color:#fff;margin:0}.side{position:fixed;width:220px;height:100%;background:#111827;padding:15px}.main{margin-left:240px;padding:20px}.card{background:#1f2937;padding:15px;border-radius:12px;margin:10px 0}button,input,select{padding:8px;margin:5px;border-radius:8px}table{width:100%;border-collapse:collapse}td,th{border:1px solid #555;padding:8px}</style></head><body><div class="side"><h2>ML Coach Pro v3.5</h2></div><div class="main"><h1>Scrim Management</h1><div class="card"><input id="opp" placeholder="Opponent"><input id="date" type="date"><input id="time" type="time"><select id="status"><option>Scheduled</option><option>Completed</option><option>Cancelled</option></select><button onclick="addScrim()">Add Scrim</button></div><div class="card"><h3>Upcoming Match</h3><div id="up"></div></div><div class="card"><table><thead><tr><th>Opponent</th><th>Date</th><th>Time</th><th>Status</th><th>Action</th></tr></thead><tbody id="list"></tbody></table></div></div><script>let scrims=JSON.parse(localStorage.getItem("ml_scrims_v35")||"[]");function save(){localStorage.setItem("ml_scrims_v35",JSON.stringify(scrims))}function addScrim(){let o=opp.value,d=date.value,t=time.value,s=status.value;if(!o||!d)return;scrims.push({id:Date.now(),o,d,t,s});save();render();opp.value="";date.value="";time.value=""}function del(id){scrims=scrims.filter(x=>x.id!=id);save();render()}function edit(id){let x=scrims.find(a=>a.id==id);if(!x)return;let no=prompt("Opponent",x.o);if(no===null)return;x.o=no;x.d=prompt("Date",x.d)||x.d;x.t=prompt("Time",x.t)||x.t;x.s=prompt("Status",x.s)||x.s;save();render()}function render(){list.innerHTML="";scrims.sort((a,b)=>(a.d+a.t).localeCompare(b.d+b.t));scrims.forEach(x=>list.innerHTML+=`<tr><td>${x.o}</td><td>${x.d}</td><td>${x.t}</td><td>${x.s}</td><td><button onclick="edit(${x.id})">Edit</button><button onclick="del(${x.id})">Delete</button></td></tr>`);let n=scrims.find(x=>x.s==="Scheduled");up.textContent=n?`${n.o} | ${n.d} ${n.t}`:"No upcoming match"}render();</script></body></html>
