<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Coach Pro v1.3</title>

<style>
:root{
    --bg:#0b1020;
    --card:rgba(255,255,255,0.06);
    --text:#fff;
    --muted:#94a3b8;
    --blue:#4f46e5;
    --purple:#a855f7;
    --red:#ef4444;
    --green:#22c55e;
    --border:rgba(255,255,255,0.1);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background: radial-gradient(circle,#111827,#050814);
    color:var(--text);
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    width:240px;
    height:100%;
    background:rgba(15,23,42,0.9);
    padding:20px;
    border-right:1px solid var(--border);
}

.sidebar h2{color:var(--purple);}

.nav button{
    width:100%;
    margin:5px 0;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:transparent;
    color:white;
}

/* MAIN */
.main{
    margin-left:260px;
    padding:20px;
}

.card{
    background:var(--card);
    padding:15px;
    margin:10px 0;
    border-radius:15px;
    border:1px solid var(--border);
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    background:#111827;
    color:white;
    border:1px solid var(--border);
}

.primary{
    background:linear-gradient(45deg,var(--blue),var(--purple));
    color:white;
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>ML Coach Pro v1.3</h2>

<div class="nav">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('players')">Players</button>
<button onclick="show('matches')">Matches</button>
<button onclick="show('scrims')">Scrims</button>
<button onclick="show('notes')">Coach Notes</button>
</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h1>Dashboard</h1>

<div class="card">
<h3>Total Players</h3>
<h1 id="totalPlayers">0</h1>
</div>

<div class="card">
<h3>Total Matches</h3>
<h1 id="totalMatches">0</h1>
</div>

<div class="card">
<h3>Win Rate</h3>
<h1 id="winRate">0%</h1>
</div>
</div>

<!-- PLAYERS -->
<div id="players" style="display:none">
<h1>Players</h1>

<input id="name" placeholder="Player Name">

<select id="role">
<option>Gold</option>
<option>Jungle</option>
<option>Mid</option>
<option>Roam</option>
<option>EXP</option>
</select>

<button class="primary" onclick="addPlayer()">Add Player</button>

<div id="playerList"></div>
</div>

<!-- MATCHES -->
<div id="matches" style="display:none">
<h1>Match History</h1>

<div class="card">
<input id="opponent" placeholder="Opponent Team">
<input id="score" placeholder="Score (e.g 2-1)">

<select id="result">
<option>Win</option>
<option>Lose</option>
</select>

<button class="primary" onclick="addMatch()">Save Match</button>
</div>

<div id="matchList"></div>
</div>

<!-- SCRIMS -->
<div id="scrims" style="display:none">
<h1>Scrims</h1>

<div class="card">
<input id="scrimTeam" placeholder="Team Name">
<input id="scrimDate" type="date">

<button class="primary" onclick="addScrim()">Add Scrim</button>
</div>

<div id="scrimList"></div>
</div>

<!-- NOTES -->
<div id="notes" style="display:none">
<h1>Coach Notes</h1>

<div class="card">
<textarea id="noteText" style="width:100%;height:120px;background:#111827;color:white;border-radius:10px;"></textarea>
<button class="primary" onclick="saveNote()">Save Notes</button>
</div>

<div class="card">
<p id="savedNote"></p>
</div>
</div>

</div>

<script>

/* DATA */
let players = JSON.parse(localStorage.getItem("v3_players")) || [];
let matches = JSON.parse(localStorage.getItem("v3_matches")) || [];
let scrims = JSON.parse(localStorage.getItem("v3_scrims")) || [];
let note = localStorage.getItem("v3_notes") || "";

/* NAV */
function show(page){
    document.querySelectorAll("#dashboard,#players,#matches,#scrims,#notes")
    .forEach(e=>e.style.display="none");
    document.getElementById(page).style.display="block";
}

/* PLAYERS */
function addPlayer(){
    let name=document.getElementById("name").value;
    let role=document.getElementById("role").value;
    if(!name) return;

    players.push({id:Date.now(),name,role});
    save();
    renderPlayers();
    update();
}

function renderPlayers(){
    document.getElementById("playerList").innerHTML =
    players.map(p=>`
        <div class="card">
            <h3>${p.name}</h3>
            <p>${p.role}</p>
            <button onclick="deletePlayer(${p.id})" class="primary" style="background:red">Delete</button>
        </div>
    `).join("");
}

function deletePlayer(id){
    players=players.filter(p=>p.id!==id);
    save();renderPlayers();update();
}

/* MATCHES */
function addMatch(){
    let opponent=document.getElementById("opponent").value;
    let score=document.getElementById("score").value;
    let result=document.getElementById("result").value;

    matches.push({id:Date.now(),opponent,score,result});
    save();
    renderMatches();
    update();
}

function renderMatches(){
    document.getElementById("matchList").innerHTML =
    matches.map(m=>`
        <div class="card">
            <h3>${m.opponent}</h3>
            <p>${m.score} (${m.result})</p>
        </div>
    `).join("");
}

/* SCRIMS */
function addScrim(){
    let team=document.getElementById("scrimTeam").value;
    let date=document.getElementById("scrimDate").value;

    scrims.push({id:Date.now(),team,date});
    save();
    renderScrims();
}

function renderScrims(){
    document.getElementById("scrimList").innerHTML =
    scrims.map(s=>`
        <div class="card">
            <h3>${s.team}</h3>
            <p>${s.date}</p>
        </div>
    `).join("");
}

/* NOTES */
function saveNote(){
    let t=document.getElementById("noteText").value;
    localStorage.setItem("v3_notes",t);
    document.getElementById("savedNote").innerText=t;
}

/* SAVE */
function save(){
    localStorage.setItem("v3_players",JSON.stringify(players));
    localStorage.setItem("v3_matches",JSON.stringify(matches));
    localStorage.setItem("v3_scrims",JSON.stringify(scrims));
}

/* DASHBOARD */
function update(){

    document.getElementById("totalPlayers").innerText=players.length;
    document.getElementById("totalMatches").innerText=matches.length;

    let win = matches.filter(m=>m.result==="Win").length;
    let rate = matches.length?((win/matches.length)*100).toFixed(1):0;

    document.getElementById("winRate").innerText=rate+"%";
}

/* INIT */
renderPlayers();
renderMatches();
renderScrims();
update();
show("dashboard");

if(note){
    document.getElementById("savedNote").innerText=note;
    document.getElementById("noteText").value=note;
}

</script>

</body>
</html>
