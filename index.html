<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Coach Pro v3.2</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --bg:#0b1020;
    --card:rgba(255,255,255,0.06);
    --text:#fff;
    --muted:#94a3b8;
    --blue:#4f46e5;
    --purple:#a855f7;
    --red:#ef4444;
    --green:#22c55e;
    --border:rgba(255,255,255,0.1);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background:radial-gradient(circle at top,#111827,#050814);
    color:var(--text);
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    width:240px;
    height:100%;
    background:rgba(15,23,42,0.9);
    padding:20px;
    border-right:1px solid var(--border);
}

.sidebar h2{color:var(--purple);}

.nav button{
    width:100%;
    margin:6px 0;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:transparent;
    color:white;
    cursor:pointer;
}

.nav button:hover{background:var(--blue);}

/* MAIN */
.main{
    margin-left:260px;
    padding:20px;
}

.card{
    background:var(--card);
    padding:15px;
    margin:10px 0;
    border-radius:15px;
    border:1px solid var(--border);
    backdrop-filter:blur(10px);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    background:#111827;
    color:white;
    border:1px solid var(--border);
}

.primary{
    background:linear-gradient(45deg,var(--blue),var(--purple));
    color:white;
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

.btn-red{background:var(--red);color:white;border:none;padding:5px;border-radius:6px;cursor:pointer;}
.btn-blue{background:var(--blue);color:white;border:none;padding:5px;border-radius:6px;cursor:pointer;}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
}

.day{
    padding:10px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    border-radius:10px;
    min-height:60px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>ML Coach Pro v3.2</h2>

<div class="nav">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('players')">Players</button>
<button onclick="show('scrim')">Scrim</button>
<button onclick="show('matches')">Matches</button>
<button onclick="show('stats')">Stats</button>
</div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h1>Dashboard</h1>

<div class="grid">
<div class="card">
<h3>Players</h3>
<h1 id="totalPlayers">0</h1>
</div>

<div class="card">
<h3>Scrim</h3>
<h1 id="totalScrim">0</h1>
</div>

<div class="card">
<h3>Matches</h3>
<h1 id="totalMatches">0</h1>
</div>
</div>

<div class="card">
<canvas id="radar"></canvas>
</div>

</div>

<!-- PLAYERS -->
<div id="players" style="display:none">
<h1>Players</h1>

<input id="name" placeholder="Player Name">

<select id="role">
<option>Gold</option>
<option>Jungle</option>
<option>Mid</option>
<option>Roam</option>
<option>EXP</option>
</select>

<button class="primary" onclick="addPlayer()">Add Player</button>

<div id="playerList"></div>
</div>

<!-- SCRIM CALENDAR -->
<div id="scrim" style="display:none">
<h1>Scrim Calendar</h1>

<div class="card">
<input id="scrimTeam" placeholder="Opponent Team">
<input id="scrimDate" type="date">
<button class="primary" onclick="addScrim()">Add Scrim</button>
</div>

<div class="card">
<div class="calendar" id="calendar"></div>
</div>
</div>

<!-- MATCHES -->
<div id="matches" style="display:none">
<h1>Match History</h1>

<div class="card">
<input id="opponent" placeholder="Opponent">
<select id="result">
<option>Win</option>
<option>Lose</option>
</select>
<button class="primary" onclick="addMatch()">Add Match</button>
</div>

<div id="matchList"></div>
</div>

<!-- STATS -->
<div id="stats" style="display:none">
<h1>Team Stats</h1>
<div class="card" id="statsBox"></div>
</div>

</div>

<script>

let players = JSON.parse(localStorage.getItem("v32_players")) || [];
let scrims = JSON.parse(localStorage.getItem("v32_scrims")) || [];
let matches = JSON.parse(localStorage.getItem("v32_matches")) || [];

let chart;

/* NAV */
function show(page){
document.querySelectorAll(".main > div").forEach(e=>e.style.display="none");
document.getElementById(page).style.display="block";
}

/* PLAYER */
function addPlayer(){
let name=document.getElementById("name").value;
let role=document.getElementById("role").value;
if(!name)return;

players.push({
id:Date.now(),
name,
role,
kda:(Math.random()*10).toFixed(1),
win:(Math.random()*100).toFixed(0)
});

save();renderPlayers();update();drawRadar();
}

/* SCRIM */
function addScrim(){
scrims.push({
id:Date.now(),
team:document.getElementById("scrimTeam").value,
date:document.getElementById("scrimDate").value
});

save();
renderCalendar();
update();
}

/* MATCH */
function addMatch(){
matches.push({
id:Date.now(),
opponent:document.getElementById("opponent").value,
result:document.getElementById("result").value
});

save();
renderMatches();
update();
}

/* RENDER PLAYERS */
function renderPlayers(){
let html="";
players.forEach(p=>{
html+=`
<div class="card">
<b>${p.name}</b>
<p>${p.role}</p>
<p>KDA:${p.kda} WR:${p.win}%</p>
</div>`;
});
document.getElementById("playerList").innerHTML=html;
}

/* MATCH */
function renderMatches(){
let html="";
matches.forEach(m=>{
html+=`<div class="card">${m.opponent} - ${m.result}</div>`;
});
document.getElementById("matchList").innerHTML=html;
}

/* CALENDAR SCRIM */
function renderCalendar(){

let html="";
for(let i=1;i<=30;i++){

let scr = scrims.find(s=>new Date(s.date).getDate()===i);

html+=`
<div class="day">
<b>${i}</b><br>
${scr ? scr.team : ""}
</div>`;
}

document.getElementById("calendar").innerHTML=html;
}

/* RADAR */
function drawRadar(){

let avg={kda:0,win:0,role:0};

players.forEach(p=>{
avg.kda+=parseFloat(p.kda);
avg.win+=parseFloat(p.win);
});

avg.kda/=players.length||1;
avg.win/=players.length||1;

if(chart)chart.destroy();

chart=new Chart(document.getElementById("radar"),{
type:"radar",
data:{
labels:["KDA","Win Rate"],
datasets:[{
label:"Team",
data:[avg.kda,avg.win],
backgroundColor:"rgba(168,85,247,0.2)",
borderColor:"#a855f7"
}]
}
});
}

/* UPDATE */
function update(){
document.getElementById("totalPlayers").innerText=players.length;
document.getElementById("totalScrim").innerText=scrims.length;
document.getElementById("totalMatches").innerText=matches.length;

document.getElementById("statsBox").innerHTML=
"Avg KDA: "+(players.reduce((a,b)=>a+parseFloat(b.kda),0)/players.length||0).toFixed(2);
}

/* SAVE */
function save(){
localStorage.setItem("v32_players",JSON.stringify(players));
localStorage.setItem("v32_scrims",JSON.stringify(scrims));
localStorage.setItem("v32_matches",JSON.stringify(matches));
}

/* INIT */
renderPlayers();
renderCalendar();
renderMatches();
update();
drawRadar();
show("dashboard");

</script>

</body>
</html>
