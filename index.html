<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Coach Pro v1.4</title>

<style>
:root{
    --bg:#0b1020;
    --card:rgba(255,255,255,0.06);
    --text:#fff;
    --muted:#94a3b8;
    --blue:#4f46e5;
    --purple:#a855f7;
    --red:#ef4444;
    --green:#22c55e;
    --border:rgba(255,255,255,0.1);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background: radial-gradient(circle,#111827,#050814);
    color:var(--text);
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    width:240px;
    height:100%;
    background:rgba(15,23,42,0.9);
    padding:20px;
    border-right:1px solid var(--border);
}

.sidebar h2{color:var(--purple);}

.nav button{
    width:100%;
    margin:5px 0;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:transparent;
    color:white;
    cursor:pointer;
}

.main{
    margin-left:260px;
    padding:20px;
}

.card{
    background:var(--card);
    padding:15px;
    margin:10px 0;
    border-radius:15px;
    border:1px solid var(--border);
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    background:#111827;
    color:white;
    border:1px solid var(--border);
}

.primary{
    background:linear-gradient(45deg,var(--blue),var(--purple));
    color:white;
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>ML Coach Pro v1.4</h2>

<div class="nav">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('players')">Players</button>
<button onclick="show('tournament')">Tournament</button>
<button onclick="show('ranking')">Ranking</button>
</div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h1>Dashboard</h1>

<div class="card">
<h3>Total Players</h3>
<h1 id="totalPlayers">0</h1>
</div>

<div class="card">
<h3>Tournaments</h3>
<h1 id="totalTournaments">0</h1>
</div>

<div class="card">
<h3>Win Rate</h3>
<h1 id="winRate">0%</h1>
</div>
</div>

<!-- PLAYERS -->
<div id="players" style="display:none">
<h1>Players</h1>

<input id="name" placeholder="Player Name">

<select id="role">
<option>Gold</option>
<option>Jungle</option>
<option>Mid</option>
<option>Roam</option>
<option>EXP</option>
</select>

<button class="primary" onclick="addPlayer()">Add Player</button>

<div id="list"></div>
</div>

<!-- TOURNAMENT -->
<div id="tournament" style="display:none">
<h1>Tournament</h1>

<div class="card">
<input id="tName" placeholder="Tournament Name">
<input id="tPrize" placeholder="Prize Pool">

<button class="primary" onclick="addTournament()">Add Tournament</button>
</div>

<div id="tList"></div>
</div>

<!-- RANKING -->
<div id="ranking" style="display:none">
<h1>Ranking (Auto Sorted)</h1>

<div id="rankList"></div>
</div>

</div>

<script>

/* STORAGE */
let players = JSON.parse(localStorage.getItem("v4_players")) || [];
let tournaments = JSON.parse(localStorage.getItem("v4_tournaments")) || [];

/* HERO POOL */
let heroes = ["Lancelot","Fanny","Ling","Aldous","Hayabusa","Beatrix","Claude","Valentina"];

/* NAV */
function show(page){
    document.querySelectorAll("#dashboard,#players,#tournament,#ranking")
    .forEach(e=>e.style.display="none");

    document.getElementById(page).style.display="block";
}

/* ADD PLAYER */
function addPlayer(){

    let name=document.getElementById("name").value;
    let role=document.getElementById("role").value;

    if(!name) return;

    players.push({
        id:Date.now(),
        name,
        role,
        wins:Math.floor(Math.random()*30),
        losses:Math.floor(Math.random()*20),
        mvp:Math.floor(Math.random()*10),
        hero:heroes[Math.floor(Math.random()*heroes.length)]
    });

    save();
    renderPlayers();
    update();
}

/* TOURNAMENT */
function addTournament(){

    let name=document.getElementById("tName").value;
    let prize=document.getElementById("tPrize").value;

    if(!name) return;

    tournaments.push({
        id:Date.now(),
        name,
        prize
    });

    save();
    renderTournaments();
    update();
}

/* RENDER PLAYERS */
function renderPlayers(){

    let html="";

    players.forEach(p=>{

        let winrate = ((p.wins/(p.wins+p.losses||1))*100).toFixed(1);

        html += `
        <div class="card">
            <h3>${p.name}</h3>
            <p>${p.role}</p>
            <p>Hero: ${p.hero}</p>
            <p>Win Rate: ${winrate}% | MVP: ${p.mvp}</p>
        </div>`;
    });

    document.getElementById("list").innerHTML=html;
}

/* TOURNAMENT */
function renderTournaments(){

    document.getElementById("tList").innerHTML =
    tournaments.map(t=>`
        <div class="card">
            <h3>${t.name}</h3>
            <p>Prize: ${t.prize}</p>
        </div>
    `).join("");
}

/* RANKING */
function renderRanking(){

    let sorted = [...players].sort((a,b)=>{
        let wa=a.wins/(a.wins+a.losses||1);
        let wb=b.wins/(b.wins+b.losses||1);
        return wb-wa;
    });

    document.getElementById("rankList").innerHTML =
    sorted.map((p,i)=>`
        <div class="card">
            <h3>#${i+1} ${p.name}</h3>
            <p>Win Rate: ${((p.wins/(p.wins+p.losses||1))*100).toFixed(1)}%</p>
        </div>
    `).join("");
}

/* DASHBOARD */
function update(){

    document.getElementById("totalPlayers").innerText=players.length;
    document.getElementById("totalTournaments").innerText=tournaments.length;

    let totalWins = players.reduce((a,b)=>a+b.wins,0);
    let totalGames = players.reduce((a,b)=>a+b.wins+b.losses,0);

    let winRate = totalGames?((totalWins/totalGames)*100).toFixed(1):0;

    document.getElementById("winRate").innerText=winRate+"%";

    renderRanking();
}

/* SAVE */
function save(){
    localStorage.setItem("v4_players",JSON.stringify(players));
    localStorage.setItem("v4_tournaments",JSON.stringify(tournaments));
}

/* INIT */
renderPlayers();
renderTournaments();
update();
show("dashboard");

</script>

</body>
</html>
