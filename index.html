<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Coach Pro v3.0</title>

<style>
:root{
    --bg:#0b1020;
    --card:rgba(255,255,255,0.06);
    --card2:rgba(255,255,255,0.1);
    --text:#fff;
    --muted:#94a3b8;
    --blue:#4f46e5;
    --purple:#a855f7;
    --red:#ef4444;
    --green:#22c55e;
    --border:rgba(255,255,255,0.1);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:radial-gradient(circle at top,#111827,#050814);
    color:var(--text);
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    width:240px;
    height:100%;
    background:rgba(15,23,42,0.9);
    padding:20px;
    border-right:1px solid var(--border);
}

.sidebar h2{
    color:var(--purple);
    margin-bottom:15px;
}

.nav button{
    width:100%;
    margin:6px 0;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:transparent;
    color:white;
    cursor:pointer;
}

.nav button:hover{
    background:var(--blue);
}

/* MAIN */
.main{
    margin-left:260px;
    padding:20px;
}

.card{
    background:var(--card);
    padding:15px;
    margin:10px 0;
    border-radius:15px;
    border:1px solid var(--border);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    background:#111827;
    color:white;
    border:1px solid var(--border);
}

.primary{
    background:linear-gradient(45deg,var(--blue),var(--purple));
    color:white;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.small{
    font-size:12px;
    color:var(--muted);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>ML Coach Pro v3.0</h2>

<div class="nav">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('players')">Players</button>
<button onclick="show('stats')">Stats</button>
<button onclick="show('hero')">Hero Pool</button>
<button onclick="show('scrim')">Scrim</button>
<button onclick="show('matches')">Matches</button>
<button onclick="show('notes')">Coach Notes</button>
</div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h1>Dashboard</h1>

<div class="grid">
<div class="card">
<h3>Total Players</h3>
<h1 id="totalPlayers">0</h1>
</div>

<div class="card">
<h3>Active Scrim</h3>
<h1 id="totalScrim">0</h1>
</div>

<div class="card">
<h3>Total Matches</h3>
<h1 id="totalMatches">0</h1>
</div>
</div>
</div>

<!-- PLAYERS -->
<div id="players" style="display:none">
<h1>Players (Max 7 Slots)</h1>

<input id="name" placeholder="Player Name">

<select id="role">
<option>Gold</option>
<option>Jungle</option>
<option>Mid</option>
<option>Roam</option>
<option>EXP</option>
</select>

<select id="status">
<option>Main</option>
<option>Sub</option>
</select>

<button class="primary" onclick="addPlayer()">Add Player</button>

<div id="playerList"></div>
</div>

<!-- STATS -->
<div id="stats" style="display:none">
<h1>Team Stats</h1>
<div class="card" id="statsBox">No data yet</div>
</div>

<!-- HERO -->
<div id="hero" style="display:none">
<h1>Hero Pool</h1>
<div class="card">
<p class="small">Assign hero randomly per player</p>
<div id="heroList"></div>
</div>
</div>

<!-- SCRIM -->
<div id="scrim" style="display:none">
<h1>Scrim Schedule</h1>

<div class="card">
<input id="scrimTeam" placeholder="Opponent Team">
<input id="scrimDate" type="date">
<button class="primary" onclick="addScrim()">Add Scrim</button>
</div>

<div id="scrimList"></div>
</div>

<!-- MATCHES -->
<div id="matches" style="display:none">
<h1>Match History</h1>

<div class="card">
<input id="opponent" placeholder="Opponent">
<select id="result">
<option>Win</option>
<option>Lose</option>
</select>
<button class="primary" onclick="addMatch()">Add Match</button>
</div>

<div id="matchList"></div>
</div>

<!-- NOTES -->
<div id="notes" style="display:none">
<h1>Coach Notes</h1>
<div class="card">
<textarea id="noteText" placeholder="Write notes..."></textarea>
<button class="primary" onclick="saveNotes()">Save Notes</button>
</div>
</div>

</div>

<script>

/* ================= CORE DATA ================= */

let players = JSON.parse(localStorage.getItem("v3_players")) || [];
let scrim = JSON.parse(localStorage.getItem("v3_scrim")) || [];
let matches = JSON.parse(localStorage.getItem("v3_matches")) || [];
let notes = localStorage.getItem("v3_notes") || "";

/* HERO POOL */
const heroes = ["Lancelot","Fanny","Ling","Aldous","Hayabusa","Valentina","Beatrix","Claude","Tigreal"];

/* ================= NAV ================= */

function show(page){
    document.querySelectorAll(".main > div")
    .forEach(e=>e.style.display="none");

    document.getElementById(page).style.display="block";
}

/* ================= PLAYER ================= */

function addPlayer(){

    if(players.length >= 7){
        alert("Max 7 players only!");
        return;
    }

    let name = document.getElementById("name").value;
    let role = document.getElementById("role").value;
    let status = document.getElementById("status").value;

    if(!name) return;

    players.push({
        id:Date.now(),
        name,
        role,
        status,
        hero:heroes[Math.floor(Math.random()*heroes.length)],
        kda:(Math.random()*10).toFixed(1),
        winRate:Math.floor(Math.random()*100)
    });

    save();
    renderPlayers();
    update();
}

/* ================= SCRIM ================= */

function addScrim(){

    let team = document.getElementById("scrimTeam").value;
    let date = document.getElementById("scrimDate").value;

    scrim.push({id:Date.now(),team,date});

    save();
    renderScrim();
    update();
}

/* ================= MATCH ================= */

function addMatch(){

    let opponent = document.getElementById("opponent").value;
    let result = document.getElementById("result").value;

    matches.push({id:Date.now(),opponent,result});

    save();
    renderMatches();
    update();
}

/* ================= NOTES ================= */

function saveNotes(){
    notes = document.getElementById("noteText").value;
    localStorage.setItem("v3_notes",notes);
    alert("Saved!");
}

/* ================= RENDER ================= */

function renderPlayers(){

    let html="";

    players.forEach(p=>{
        html += `
        <div class="card">
            <b>${p.name}</b> (${p.status})
            <p class="small">${p.role}</p>
            <p>Hero: ${p.hero}</p>
            <p>KDA: ${p.kda} | WR: ${p.winRate}%</p>
        </div>
        `;
    });

    document.getElementById("playerList").innerHTML = html;
}

/* HERO */

function renderHero(){

    let html="";

    players.forEach(p=>{
        html += `<div class="card">${p.name} → ${p.hero}</div>`;
    });

    document.getElementById("heroList").innerHTML = html;
}

/* SCRIM */

function renderScrim(){

    let html="";

    scrim.forEach(s=>{
        html += `<div class="card">${s.team} | ${s.date}</div>`;
    });

    document.getElementById("scrimList").innerHTML = html;
}

/* MATCH */

function renderMatches(){

    let html="";

    matches.forEach(m=>{
        html += `<div class="card">${m.opponent} - ${m.result}</div>`;
    });

    document.getElementById("matchList").innerHTML = html;
}

/* ================= UPDATE ================= */

function update(){

    document.getElementById("totalPlayers").innerText = players.length;
    document.getElementById("totalScrim").innerText = scrim.length;
    document.getElementById("totalMatches").innerText = matches.length;

    document.getElementById("statsBox").innerHTML =
        "Avg KDA: " +
        (players.reduce((a,b)=>a+parseFloat(b.kda||0),0)/players.length || 0).toFixed(2);
}

/* ================= SAVE ================= */

function save(){
    localStorage.setItem("v3_players",JSON.stringify(players));
    localStorage.setItem("v3_scrim",JSON.stringify(scrim));
    localStorage.setItem("v3_matches",JSON.stringify(matches));
}

/* ================= INIT ================= */

renderPlayers();
renderScrim();
renderMatches();
update();
show("dashboard");

</script>

</body>
</html>
