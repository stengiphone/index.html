<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Coach Pro v1.5</title>

<style>
:root{
    --bg:#0b1020;
    --card:rgba(255,255,255,0.06);
    --text:#fff;
    --muted:#94a3b8;
    --blue:#4f46e5;
    --purple:#a855f7;
    --gold:#fbbf24;
    --green:#22c55e;
    --red:#ef4444;
    --border:rgba(255,255,255,0.1);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background: radial-gradient(circle,#111827,#050814);
    color:var(--text);
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    width:240px;
    height:100%;
    background:rgba(15,23,42,0.9);
    padding:20px;
    border-right:1px solid var(--border);
}

.sidebar h2{color:var(--gold);}

.nav button{
    width:100%;
    margin:5px 0;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:transparent;
    color:white;
    cursor:pointer;
}

.main{
    margin-left:260px;
    padding:20px;
}

.card{
    background:var(--card);
    padding:15px;
    margin:10px 0;
    border-radius:15px;
    border:1px solid var(--border);
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    background:#111827;
    color:white;
    border:1px solid var(--border);
}

.primary{
    background:linear-gradient(45deg,var(--blue),var(--purple));
    color:white;
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

.danger{
    background:var(--red);
    color:white;
    border:none;
    padding:5px;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>ML Coach Pro v1.5</h2>

<div class="nav">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('players')">Players</button>
<button onclick="show('contracts')">Contracts</button>
<button onclick="show('sponsors')">Sponsors</button>
<button onclick="show('tools')">Tools</button>
</div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h1>Dashboard</h1>

<div class="card">
<h3>Total Players</h3>
<h1 id="totalPlayers">0</h1>
</div>

<div class="card">
<h3>Total Sponsors</h3>
<h1 id="totalSponsors">0</h1>
</div>

<div class="card">
<h3>Total Salary</h3>
<h1 id="totalSalary">RM 0</h1>
</div>
</div>

<!-- PLAYERS -->
<div id="players" style="display:none">
<h1>Players</h1>

<input id="name" placeholder="Player Name">

<select id="role">
<option>Gold</option>
<option>Jungle</option>
<option>Mid</option>
<option>Roam</option>
<option>EXP</option>
</select>

<input id="salary" placeholder="Salary (RM)">

<button class="primary" onclick="addPlayer()">Add Player</button>

<div id="list"></div>
</div>

<!-- CONTRACTS -->
<div id="contracts" style="display:none">
<h1>Contracts</h1>

<div id="contractList"></div>
</div>

<!-- SPONSORS -->
<div id="sponsors" style="display:none">
<h1>Sponsors</h1>

<input id="sName" placeholder="Sponsor Name">
<input id="sAmount" placeholder="Amount RM">

<button class="primary" onclick="addSponsor()">Add Sponsor</button>

<div id="sponsorList"></div>
</div>

<!-- TOOLS -->
<div id="tools" style="display:none">

<h1>Tools</h1>

<div class="card">
<button class="primary" onclick="exportData()">Export Data</button>

<input type="file" onchange="importData(event)">
</div>

<div class="card">
<input id="announcement" placeholder="Write announcement">
<button class="primary" onclick="addAnnouncement()">Add Announcement</button>
<button onclick="showAnnouncements()" class="primary">Show Announcements</button>
</div>

</div>

</div>

<script>

/* DATA */
let players = JSON.parse(localStorage.getItem("v5_players")) || [];
let sponsors = JSON.parse(localStorage.getItem("v5_sponsors")) || [];
let announcements = JSON.parse(localStorage.getItem("v5_announcements")) || [];

/* NAV */
function show(page){
    document.querySelectorAll("#dashboard,#players,#contracts,#sponsors,#tools")
    .forEach(e=>e.style.display="none");
    document.getElementById(page).style.display="block";
}

/* PLAYERS */
function addPlayer(){

    let name=document.getElementById("name").value;
    let role=document.getElementById("role").value;
    let salary=parseFloat(document.getElementById("salary").value||0);

    if(!name) return;

    players.push({
        id:Date.now(),
        name,
        role,
        salary,
        contract:"Active"
    });

    save();
    renderPlayers();
    renderContracts();
    update();
}

/* SPONSORS */
function addSponsor(){

    let name=document.getElementById("sName").value;
    let amount=parseFloat(document.getElementById("sAmount").value||0);

    if(!name) return;

    sponsors.push({
        id:Date.now(),
        name,
        amount
    });

    save();
    renderSponsors();
    update();
}

/* CONTRACT TOGGLE */
function toggleContract(id){

    players=players.map(p=>{
        if(p.id===id){
            p.contract=p.contract==="Active"?"Inactive":"Active";
        }
        return p;
    });

    save();
    renderContracts();
    renderPlayers();
}

/* RENDER */
function renderPlayers(){

    document.getElementById("list").innerHTML =
    players.map(p=>`
        <div class="card">
            <h3>${p.name}</h3>
            <p>${p.role}</p>
            <p>Salary: RM ${p.salary}</p>
            <p>Status: ${p.contract}</p>
        </div>
    `).join("");
}

function renderContracts(){

    document.getElementById("contractList").innerHTML =
    players.map(p=>`
        <div class="card">
            <h3>${p.name}</h3>
            <p>${p.contract}</p>
            <button class="primary" onclick="toggleContract(${p.id})">Toggle</button>
        </div>
    `).join("");
}

function renderSponsors(){

    document.getElementById("sponsorList").innerHTML =
    sponsors.map(s=>`
        <div class="card">
            <h3>${s.name}</h3>
            <p>RM ${s.amount}</p>
        </div>
    `).join("");
}

/* DASHBOARD */
function update(){

    let totalSalary = players.reduce((a,b)=>a+(b.salary||0),0);
    let totalSponsors = sponsors.reduce((a,b)=>a+(b.amount||0),0);

    document.getElementById("totalPlayers").innerText=players.length;
    document.getElementById("totalSponsors").innerText=sponsors.length;
    document.getElementById("totalSalary").innerText="RM "+totalSalary;
}

/* EXPORT */
function exportData(){

    let data={
        players,
        sponsors,
        announcements,
        date:new Date()
    };

    let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    let url=URL.createObjectURL(blob);

    let a=document.createElement("a");
    a.href=url;
    a.download="ml_coach_backup.json";
    a.click();
}

/* IMPORT */
function importData(e){

    let reader=new FileReader();

    reader.onload=function(ev){

        let data=JSON.parse(ev.target.result);

        players=data.players||[];
        sponsors=data.sponsors||[];
        announcements=data.announcements||[];

        save();
        renderPlayers();
        renderSponsors();
        renderContracts();
        update();
    };

    reader.readAsText(e.target.files[0]);
}

/* ANNOUNCEMENT */
function addAnnouncement(){

    let msg=document.getElementById("announcement").value;
    if(!msg) return;

    announcements.push({id:Date.now(),msg});
    save();
    alert("Announcement added!");
}

function showAnnouncements(){

    alert(announcements.map(a=>"• "+a.msg).join("\n"));
}

/* SAVE */
function save(){

    localStorage.setItem("v5_players",JSON.stringify(players));
    localStorage.setItem("v5_sponsors",JSON.stringify(sponsors));
    localStorage.setItem("v5_announcements",JSON.stringify(announcements));
}

/* AUTO BACKUP */
setInterval(save,3000);

/* INIT */
renderPlayers();
renderSponsors();
renderContracts();
update();
show("dashboard");

</script>

</body>
</html>
